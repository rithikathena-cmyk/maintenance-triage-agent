# Render blueprint for the FastAPI backend (+ the two MCP servers it spawns).
# Deploy: push this repo to GitHub, then in Render → "New +" → "Blueprint" and
# point it at the repo. Set the `sync: false` secrets in the Render dashboard.
services:
  - type: web
    name: maintenance-triage-api
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      # --- set these in the Render dashboard (not stored in the repo) ---
      - key: DATABASE_URL          # mysql+pymysql://USER:PASS@HOST:4000/DB  (TiDB Cloud)
        sync: false
      - key: ANTHROPIC_API_KEY     # your ROTATED key
        sync: false
      # --- safe to keep here ---
      - key: CLAUDE_MODEL
        value: "claude-opus-4-8"
      - key: SEED_ON_START         # seeds sample data on first boot (no-op once populated)
        value: "true"
